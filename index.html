<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartOps KV3 Presentation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --viettel-red: #EE0033;
            --viettel-red-dark: #cc002c;
            --viettel-red-glow: rgba(238, 0, 51, 0.4);
            --bg-dark: #09090b; /* Zinc 950 */
            --bg-card: rgba(24, 24, 27, 0.7); /* Zinc 900 */
            --bg-card-hover: rgba(39, 39, 42, 0.8);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #38bdf8;
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-border-highlight: rgba(238, 0, 51, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Abstract Dynamic Background */
        .bg-container {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -2;
            background-image: url('images/bg_main.png');
            background-size: cover;
            background-position: center;
        }
        
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            background: linear-gradient(135deg, rgba(9, 9, 11, 0.95) 0%, rgba(9, 9, 11, 0.8) 100%);
            backdrop-filter: blur(2px);
        }

        .blob {
            position: absolute;
            filter: blur(80px);
            opacity: 0.4;
            border-radius: 50%;
            animation: float 10s infinite ease-in-out alternate;
            z-index: -1;
        }
        .blob.red {
            width: 40vw; height: 40vw;
            background: var(--viettel-red);
            top: -10vw; right: -10vw;
            animation-delay: 0s;
        }
        .blob.blue {
            width: 30vw; height: 30vw;
            background: var(--accent-blue);
            bottom: -5vw; left: -10vw;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-30px, 30px) scale(1.1); }
        }

        /* Glassmorphism effects */
        .glass {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }
        
        .glass::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.03), transparent);
            transform: skewX(-20deg);
            transition: all 0.7s ease;
        }
        
        .glass:hover {
            border-color: var(--glass-border-highlight);
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(238, 0, 51, 0.15);
        }
        
        .glass:hover::before {
            left: 200%;
        }

        .header {
            padding: 1.5rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            z-index: 10;
            background: rgba(9, 9, 11, 0.7);
            backdrop-filter: blur(20px);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--viettel-red);
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo span {
            color: var(--text-main);
            font-weight: 300;
        }

        .slide-container {
            flex: 1;
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            overflow: hidden;
            perspective: 1000px;
        }

        .slide {
            position: absolute;
            width: 1440px;
            height: 800px;
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            transform: scale(calc(var(--scale, 1) * 0.9)) translateZ(-100px) rotateX(5deg);
            transform-origin: center center;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 2.5rem;
        }

        .slide.active {
            opacity: 1;
            transform: scale(var(--scale, 1)) translateZ(0) rotateX(0);
            pointer-events: all;
            z-index: 5;
        }

        .slide-title {
            font-size: 3rem;
            font-weight: 800;
            color: transparent;
            background: linear-gradient(90deg, #fff, #cbd5e1);
            -webkit-background-clip: text;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            position: relative;
            display: inline-block;
        }
        
        .slide-title::after {
            content: '';
            position: absolute;
            left: 0; bottom: -10px;
            width: 60px; height: 4px;
            background: var(--viettel-red);
            border-radius: 2px;
            box-shadow: 0 0 15px var(--viettel-red-glow);
        }

        .slide-subtitle {
            font-size: 1.4rem;
            color: var(--accent-blue);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        /* Layout Utilities */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }
        .flex-col { display: flex; flex-direction: column; gap: 1.5rem; }
        .flex-row { display: flex; align-items: center; gap: 1rem; }
        .flex-center { display: flex; justify-content: center; align-items: center; }
        .text-center { text-align: center; }

        /* Typography & Lists */
        h3 { font-size: 1.6rem; margin-bottom: 1rem; color: #fff; font-weight: 600; display: flex; align-items: center; gap: 10px;}
        h3 i { color: var(--viettel-red); }
        
        ul.icon-list { list-style: none; display: flex; flex-direction: column; gap: 1.2rem; }
        ul.icon-list li { 
            display: flex; 
            align-items: flex-start; 
            gap: 15px; 
            font-size: 1.2rem; 
            line-height: 1.5;
            color: var(--text-muted);
            transition: color 0.3s;
        }
        ul.icon-list li:hover { color: #fff; }
        ul.icon-list li i { 
            color: var(--viettel-red); 
            flex-shrink: 0; 
            margin-top: 3px;
        }

        /* Tags / Badges */
        .tags { display: flex; flex-wrap: wrap; gap: 1rem; }
        .tag {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.6rem 1.2rem;
            border-radius: 30px;
            font-size: 1rem;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }
        .tag:hover {
            background: rgba(238, 0, 51, 0.1);
            border-color: rgba(238, 0, 51, 0.4);
            color: #fff;
            transform: translateY(-2px);
        }
        .tag.blue:hover {
            background: rgba(56, 189, 248, 0.1);
            border-color: rgba(56, 189, 248, 0.4);
        }
        .tag.red-solid {
            background: var(--viettel-red);
            border: none;
            color: white;
            box-shadow: 0 4px 15px var(--viettel-red-glow);
        }

        /* Flow Arrow */
        .flow-arrow {
            color: var(--viettel-red);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Animations */
        .animate-in {
            opacity: 0;
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: var(--delay, 0s);
        }
        
        .slide.active .animate-in {
            animation-play-state: running;
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(238,0,51,0.4); }
            70% { box-shadow: 0 0 0 15px rgba(238,0,51,0); }
            100% { box-shadow: 0 0 0 0 rgba(238,0,51,0); }
        }

        /* Controls */
        .controls {
            padding: 1.5rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(9, 9, 11, 0.85);
            border-top: 1px solid var(--glass-border);
            z-index: 10;
            backdrop-filter: blur(20px);
        }

        .btn {
            background: var(--viettel-red);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn:hover {
            background: var(--viettel-red-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px var(--viettel-red-glow);
        }
        
        .btn-outline {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
        }
        
        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            box-shadow: none;
        }

        .progress-bar-container {
            flex: 1;
            margin: 0 3rem;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #cc002c, #ff1a4d);
            border-radius: 4px;
            width: 0%;
            transition: width 0.4s ease;
            box-shadow: 0 0 15px var(--viettel-red-glow);
        }
        
        .progress-markers {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: space-between;
        }
        
        .marker {
            width: 2px; height: 100%;
            background: rgba(9,9,11,0.8);
        }

        .highlight { color: #fff; font-weight: 800; }
        .text-viettel { color: var(--viettel-red); }
        .text-blue { color: var(--accent-blue); }
        
        /* Dashboard Widget Style */
        .widget {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: all 0.3s;
        }
        .widget:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.1);
        }
        .widget-title {
            color: var(--accent-blue);
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .widget-value {
            font-size: 2.2rem;
            font-weight: 800;
            color: #fff;
        }
        .widget-status {
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .status-good { color: #10b981; }
        .status-warn { color: #f59e0b; }
        .status-bad { color: var(--viettel-red); }

        .subtitles-container {
            display: none;
        }
        
        .chat-bubble {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 1rem 1.5rem;
            border-radius: 16px;
            border-bottom-left-radius: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1rem;
            color: #e2e8f0;
        }
        .chat-bubble i { color: var(--accent-blue); }

        /* Responsive scaling moved to JS */
    </style>
</head>

                                <h4 style="color: var(--text-muted); font-size: 1.1rem;"><i data-lucide="step-forward" style="display:inline; width:16px;"></i> Giai đoạn 1</h4>
                                <div style="font-size: 1.2rem; color: var(--text-muted); margin-top: 1rem;">Từ điều hành thủ công</div>
                                <div style="font-size: 1.3rem; font-weight: bold; color: var(--accent-blue); margin-top: 5px;"><i data-lucide="arrow-right" style="display:inline; width:18px;"></i> Điều hành theo Dữ liệu</div>
                            </div>
                            <div class="widget animate-in" style="--delay: 0.5s">
                                <h4 style="color: var(--text-muted); font-size: 1.1rem;"><i data-lucide="step-forward" style="display:inline; width:16px;"></i> Giai đoạn 2</h4>
                                <div style="font-size: 1.2rem; color: var(--text-muted); margin-top: 1rem;">Từ phản ứng sự cố</div>
                                <div style="font-size: 1.3rem; font-weight: bold; color: var(--accent-blue); margin-top: 5px;"><i data-lucide="arrow-right" style="display:inline; width:18px;"></i> Chủ động Dự báo</div>
                            </div>
                            <div class="widget animate-in" style="border-color: var(--viettel-red); background: rgba(238,0,51,0.1); box-shadow: 0 0 30px rgba(238,0,51,0.2); --delay: 0.7s">
                                <h4 style="color: var(--viettel-red); font-size: 1.1rem;"><i data-lucide="step-forward" style="display:inline; width:16px;"></i> Giai đoạn 3</h4>
                                <div style="font-size: 1.2rem; color: #fff; margin-top: 1rem;">Từ xem Dashboard</div>
                                <div style="font-size: 1.4rem; font-weight: bold; color: #fff; margin-top: 5px;"><i data-lucide="arrow-right" style="display:inline; width:18px;"></i> AI Hỗ trợ ra quyết định</div>
                            </div>
                        </div>
                        
                        <div class="mt-4 p-4 animate-in" style="width: 100%; border-radius: 16px; background: linear-gradient(90deg, rgba(238,0,51,0.1), rgba(238,0,51,0.4), rgba(238,0,51,0.1)); border: 1px solid rgba(238,0,51,0.5); --delay: 1s">
                            <div style="font-size: 1.8rem; font-weight: 800; color: #fff; letter-spacing: 4px; display: flex; justify-content: center; gap: 20px;">
                                <span>DỰ BÁO</span> • <span>CHỦ ĐỘNG</span> • <span>TỰ ĐỘNG</span> • <span>TỰ TRỊ</span>
                            </div>
                        </div>
                    </div>
                `
            }
        ];

        let currentScene = 0;
        let isPlaying = false;
        let isAutoPlaying = false;
        let slideTimeout = null;

        const container = document.getElementById('slideContainer');
        const subtitleText = document.getElementById('subtitleText');
        const progressBar = document.getElementById('progressBar');
        const progressMarkers = document.getElementById('progressMarkers');
        
        // Initialize slides
        function initSlides() {
            scenesData.forEach((scene, index) => {
                const slide = document.createElement('div');
                slide.className = 'slide';
                slide.id = 'slide-' + index;
                slide.innerHTML = `
                    <div>
                        <div class="slide-subtitle">0${index + 1} // ${scene.subtitle}</div>
                        <h2 class="slide-title">${scene.title}</h2>
                    </div>
                    ${scene.content}
                `;
                container.appendChild(slide);

                // Create progress markers
                if (index > 0) {
                    const marker = document.createElement('div');
                    marker.className = 'marker';
                    marker.style.left = `${(index / scenesData.length) * 100}%`;
                    progressMarkers.appendChild(marker);
                }
            });

            showSlide(0);
        }

        function showSlide(index) {
            // Remove active from all
            document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
            
            // Add active to current
            const slide = document.getElementById('slide-' + index);
            if(slide) {
                slide.classList.add('active');
                lucide.createIcons(); // Re-initialize icons for newly shown slide content
            }
            
            // Update progress bar
            const progress = ((index) / (scenesData.length - 1)) * 100;
            progressBar.style.width = `${progress}%`;

            // Handle audio/tts if auto playing
            if (isAutoPlaying) {
                playAudioForSlide(index);
            } else {
                stopAudio();
            }
        }

        function nextSlide() {
            if (currentScene < scenesData.length - 1) {
                currentScene++;
                showSlide(currentScene);
            } else {
                toggleAutoPlay(); // End presentation
            }
        }

        function prevSlide() {
            if (currentScene > 0) {
                currentScene--;
                showSlide(currentScene);
            }
        }

        // --- Audio Implementation ---
        
        function playAudioForSlide(index) {
            stopAudio();
            clearTimeout(slideTimeout);
            
            subtitleText.classList.add('visible');

            // Load real audio file (e.g. audio/scene_1.mp3)
            const audioUrl = `audio/scene_${index + 1}.mp3`;
            const audio = new Audio(audioUrl);
            
            window.currentAudio = audio; // Keep reference to stop it later
            
            audio.oncanplaythrough = () => {
                if(window.currentAudio === audio) {
                    audio.oncanplaythrough = null;
                    audio.play();
                }
            };

            audio.onended = () => {
                if(isAutoPlaying) {
                    slideTimeout = setTimeout(nextSlide, 1000);
                }
            };

            audio.onerror = () => {
                console.warn("Audio file not found: " + audioUrl);
                if(isAutoPlaying) {
                    slideTimeout = setTimeout(nextSlide, 5000);
                }
            };
        }

        function stopAudio() {
            if(window.currentAudio) {
                window.currentAudio.pause();
                window.currentAudio.currentTime = 0;
                window.currentAudio = null;
            }
            clearTimeout(slideTimeout);
            subtitleText.classList.remove('visible');
        }

        function toggleAutoPlay() {
            isAutoPlaying = !isAutoPlaying;
            const playIcon = document.getElementById('playIcon');
            const pauseIcon = document.getElementById('pauseIcon');
            const playPauseText = document.getElementById('playPauseText');

            if (isAutoPlaying) {
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'inline-block';
                playPauseText.textContent = 'Dừng (Pause)';
                
                // If we are at the end and click play, restart
                if (currentScene === scenesData.length - 1 && (!window.currentAudio || window.currentAudio.paused)) {
                    currentScene = 0;
                }
                showSlide(currentScene);
            } else {
                playIcon.style.display = 'inline-block';
                pauseIcon.style.display = 'none';
                playPauseText.textContent = 'Auto Play Voice';
                stopAudio();
            }
        }

        // Event Listeners
        document.getElementById('nextBtn').addEventListener('click', () => {
            if(isAutoPlaying) stopAudio(); // pause current audio to jump
            nextSlide();
        });
        
        document.getElementById('prevBtn').addEventListener('click', () => {
            if(isAutoPlaying) stopAudio();
            prevSlide();
        });

        document.getElementById('playPauseBtn').addEventListener('click', toggleAutoPlay);

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === 'Space') {
                e.preventDefault();
                nextSlide();
            } else if (e.key === 'ArrowLeft') {
                prevSlide();
            }
        });

        // Setup Responsive Scaling
        function resizeSlides() {
            const container = document.getElementById('slideContainer');
            if (!container) return;
            
            // Base resolution 1440x800
            const scaleX = container.clientWidth / 1440;
            const scaleY = container.clientHeight / 800;
            const scale = Math.min(scaleX, scaleY) * 0.95; // 95% to leave a tiny padding
            
            document.documentElement.style.setProperty('--scale', scale);
        }

        window.addEventListener('resize', resizeSlides);
        resizeSlides();

        // Initialize
        initSlides();
        lucide.createIcons();

    </script>
</body>
</html>
