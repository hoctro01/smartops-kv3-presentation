<head>
    <meta charset="UTF-8">

    <title>SmartOps KV3 - Cinematic Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;500;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --red-neon: #ff003c;
            --blue-neon: #00f3ff;
            --bg-dark: #030305;
            --hud-color: rgba(0, 243, 255, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Cinematic Letterbox */
        .letterbox {
            position: fixed;
            left: 0;
            width: 100vw;
            height: 8vh;
            background: #000;
            z-index: 1000;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
        }
        .letterbox.top { top: 0; }
        .letterbox.bottom { bottom: 0; }

        /* HUD Overlays */
        .hud-overlay {
            position: fixed;
            top: 8vh; bottom: 8vh; left: 0; right: 0;
            pointer-events: none;
            z-index: 500;
            background: 
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .crosshair {
            position: absolute;
            width: 30px; height: 30px;
            border: 2px solid var(--hud-color);
        }
        .crosshair.tl { top: 20px; left: 20px; border-right: none; border-bottom: none; }
        .crosshair.tr { top: 20px; right: 20px; border-left: none; border-bottom: none; }
        .crosshair.bl { bottom: 20px; left: 20px; border-right: none; border-top: none; }
        .crosshair.br { bottom: 20px; right: 20px; border-left: none; border-top: none; }

        .scanline {
            width: 100%; height: 2px;
            background: rgba(0, 243, 255, 0.1);
            position: absolute;
            animation: scan 6s linear infinite;
        }
        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        /* Canvas Background */
        #bgCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            opacity: 0.8;
            background: radial-gradient(circle at center, #0a1128 0%, #030305 100%);
        }

        /* Slide Container */
        .slide-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            perspective: 1500px;
        }

        .slide {
            position: absolute;
            width: 1440px;
            height: 750px;
            opacity: 0;
            filter: blur(20px);
            transform: scale(calc(var(--scale, 1) * 1.5)) translateZ(200px);
            transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1);
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 2.5rem;
        }

        .slide.active {
            opacity: 1;
            filter: blur(0);
            transform: scale(var(--scale, 1)) translateZ(0);
            pointer-events: all;
        }

        /* Typography & Cyber UI */
        .slide-title {
            font-family: 'Share Tech Mono', monospace;
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.3), 2px 2px 0px var(--red-neon), -2px -2px 0px var(--blue-neon);
            margin-bottom: 0.5rem;
            position: relative;
            display: inline-block;
        }
        
        .slide-subtitle {
            font-size: 1.5rem;
            color: var(--blue-neon);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .slide-subtitle::before {
            content: '';
            display: inline-block;
            width: 40px; height: 2px;
            background: var(--red-neon);
            box-shadow: 0 0 10px var(--red-neon);
        }

        .glass {
            background: rgba(10, 15, 25, 0.85);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-left: 4px solid var(--blue-neon);
            padding: 2rem;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(0, 243, 255, 0.05);
            backdrop-filter: blur(10px);
            overflow: hidden;
        }
        .glass::after {
            content: ''; position: absolute;
            top: 0; right: 0; width: 20px; height: 20px;
            border-top: 2px solid var(--hud-color); border-right: 2px solid var(--hud-color);
        }
        .glass::before {
            content: ''; position: absolute;
            bottom: 0; left: 0; width: 20px; height: 20px;
            border-bottom: 2px solid var(--hud-color); border-left: 2px solid var(--hud-color);
        }

        .text-viettel { color: var(--red-neon); text-shadow: 0 0 10px var(--red-neon); }
        .text-blue { color: var(--blue-neon); text-shadow: 0 0 10px var(--blue-neon); }
        .highlight { font-weight: 800; color: #fff; }

        /* Utilities */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }
        .flex-col { display: flex; flex-direction: column; gap: 1.5rem; }
        .flex-row { display: flex; align-items: center; gap: 1rem; }
        .flex-center { display: flex; justify-content: center; align-items: center; }
        .text-center { text-align: center; }
        .mt-2 { margin-top: 1rem; } .mt-4 { margin-top: 2rem; }

        h3 { font-family: 'Share Tech Mono', monospace; font-size: 1.8rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 10px; color: #fff; }
        h3 i { color: var(--blue-neon); }
        
        ul.icon-list { list-style: none; display: flex; flex-direction: column; gap: 1.5rem; }
        ul.icon-list li { display: flex; align-items: flex-start; gap: 15px; font-size: 1.3rem; line-height: 1.5; color: rgba(255,255,255,0.8); }
        ul.icon-list li i { color: var(--blue-neon); flex-shrink: 0; }

        .tags { display: flex; flex-wrap: wrap; gap: 1rem; }
        .tag {
            background: rgba(0, 243, 255, 0.05);
            border: 1px solid var(--hud-color);
            padding: 0.5rem 1rem;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1rem;
            color: var(--blue-neon);
            display: flex; align-items: center; gap: 8px;
            text-transform: uppercase;
        }
        .tag.blue { background: rgba(0, 243, 255, 0.1); border-color: var(--blue-neon); }
        .tag.red-solid { background: rgba(255, 0, 60, 0.1); border-color: var(--red-neon); color: var(--red-neon); }
        
        .chat-bubble {
            background: rgba(255,255,255,0.03);
            border-left: 3px solid rgba(255,255,255,0.3);
            padding: 1rem 1.5rem;
            font-size: 1.2rem; display: flex; align-items: center; gap: 15px;
        }

        .widget {
            background: rgba(0, 243, 255, 0.03);
            border: 1px solid rgba(0, 243, 255, 0.2);
            padding: 1.5rem;
            position: relative;
        }
        .widget-title { font-family: 'Share Tech Mono', monospace; color: var(--hud-color); font-size: 1rem; display: flex; align-items: center; gap: 8px; text-transform: uppercase; }
        .widget-value { font-size: 2.5rem; font-weight: 900; margin: 10px 0; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .widget-status { font-size: 0.9rem; display: flex; align-items: center; gap: 5px; color: rgba(255,255,255,0.6); }
        
        .status-good { color: #00ff66; text-shadow: 0 0 10px #00ff66; }
        .status-bad { color: var(--red-neon); text-shadow: 0 0 10px var(--red-neon); }
        .status-warn { color: #f59e0b; text-shadow: 0 0 10px #f59e0b; }

        .flow-arrow { display: flex; justify-content: center; color: var(--hud-color); opacity: 0.6; }

        /* Staggered Animations */
        .animate-in { opacity: 0; filter: blur(10px); transform: translateY(20px); transition: all 0.8s ease var(--delay); }
        .slide.active .animate-in { opacity: 1; filter: blur(0); transform: translateY(0); }

        /* Controls */
        .controls {
            position: fixed;
            bottom: 2vh; left: 0; width: 100%;
            display: flex; justify-content: center; align-items: center; gap: 30px;
            z-index: 1000;
        }
        .btn {
            background: rgba(0,0,0,0.5); border: 1px solid var(--hud-color); color: var(--blue-neon);
            padding: 10px 20px; font-family: 'Share Tech Mono', monospace; font-size: 1rem;
            cursor: pointer; display: flex; align-items: center; gap: 8px; text-transform: uppercase;
            transition: all 0.3s;
        }
        .btn:hover { background: var(--blue-neon); color: #000; box-shadow: 0 0 15px var(--blue-neon); }
        .progress-bar-container { width: 300px; height: 4px; background: rgba(255,255,255,0.1); position: relative; }
        .progress-bar { height: 100%; background: var(--red-neon); width: 0%; transition: width 0.3s; box-shadow: 0 0 10px var(--red-neon); }
    </style>
</head>

        let bgMusic = new Audio('audio/bg_music.wav');
        bgMusic.loop = true;
        bgMusic.volume = 0.15; // Nhạc nền nhẹ nhàng (15% volume)
        let bgMusicStarted = false;

        function startBgMusic() {
            if (!bgMusicStarted) {
                bgMusic.play().catch(e => console.log("Bg music play failed or not found:", e));
                bgMusicStarted = true;
            }
        }

        const container = document.getElementById('slideContainer');
        const progressBar = document.getElementById('progressBar');
        
        function initSlides() {
            scenesData.forEach((scene, index) => {
                const slide = document.createElement('div');
                slide.className = 'slide';
                slide.id = 'slide-' + index;
                slide.innerHTML = `
                    <div style="text-align: left; margin-bottom: 2rem;">
                        <div class="slide-subtitle">SYS.FILE.${index + 1} // ${scene.subtitle}</div>
                        <h2 class="slide-title type-effect">${scene.title}</h2>
                    </div>
                    ${scene.content}
                `;
                container.appendChild(slide);
            });
            showSlide(0);
        }

        function showSlide(index) {
            document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
            const slide = document.getElementById('slide-' + index);
            if(slide) {
                slide.classList.add('active');
                lucide.createIcons();
                // Typewriter effect on title
                const title = slide.querySelector('.slide-title');
                if(title) {
                    const text = title.getAttribute('data-text') || title.innerText;
                    title.setAttribute('data-text', text);
                    title.innerText = '';
                    let i = 0;
                    const type = setInterval(() => {
                        title.innerText += text.charAt(i);
                        i++;
                        if(i >= text.length) clearInterval(type);
                    }, 30);
                }
            }
            progressBar.style.width = `${(index / (scenesData.length - 1)) * 100}%`;

            if (isAutoPlaying) playAudioForSlide(index);
            else stopAudio();
        }

        function nextSlide() {
            startBgMusic();
            if (currentScene < scenesData.length - 1) {
                currentScene++;
                showSlide(currentScene);
            } else toggleAutoPlay();
        }

        function prevSlide() {
            startBgMusic();
            if (currentScene > 0) {
                currentScene--;
                showSlide(currentScene);
            }
        }

        function playAudioForSlide(index) {
            stopAudio();
            clearTimeout(slideTimeout);
            const audioUrl = `audio/scene_${index}.mp3`;
            const audio = new Audio(audioUrl);
            window.currentAudio = audio;
            audio.oncanplaythrough = () => { if(window.currentAudio === audio) { audio.oncanplaythrough = null; audio.play(); } };
            audio.onended = () => { if(isAutoPlaying) slideTimeout = setTimeout(nextSlide, 1000); };
            audio.onerror = () => { if(isAutoPlaying) slideTimeout = setTimeout(nextSlide, 4000); };
        }

        function stopAudio() {
            if(window.currentAudio) {
                window.currentAudio.pause();
                window.currentAudio.currentTime = 0;
                window.currentAudio = null;
            }
            clearTimeout(slideTimeout);
        }

        function toggleAutoPlay() {
            startBgMusic();
            isAutoPlaying = !isAutoPlaying;
            document.getElementById('playIcon').style.display = isAutoPlaying ? 'none' : 'inline-block';
            document.getElementById('pauseIcon').style.display = isAutoPlaying ? 'inline-block' : 'none';
            document.getElementById('playPauseText').textContent = isAutoPlaying ? 'SYSTEM OVERRIDE' : 'AUTO SYNC';
            if (isAutoPlaying) {
                if (currentScene === scenesData.length - 1 && (!window.currentAudio || window.currentAudio.ended)) currentScene = 0;
                showSlide(currentScene);
            } else stopAudio();
        }

        function resizeSlides() {
            const container = document.getElementById('slideContainer');
            if (!container) return;
            const scaleX = container.clientWidth / 1440;
            // Accounting for letterbox (8vh top, 8vh bottom = 16vh lost)
            const availableHeight = container.clientHeight * 0.84;
            const scaleY = availableHeight / 750;
            const scale = Math.min(scaleX, scaleY) * 0.95;
            document.documentElement.style.setProperty('--scale', scale);
        }

        window.addEventListener('resize', resizeSlides);
        document.getElementById('prevBtn').addEventListener('click', prevSlide);
        document.getElementById('nextBtn').addEventListener('click', nextSlide);
        document.getElementById('playPauseBtn').addEventListener('click', toggleAutoPlay);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === 'Space') { e.preventDefault(); nextSlide(); }
            else if (e.key === 'ArrowLeft') prevSlide();
        });

        // CANVAS PARTICLES
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        
        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            for(let i = 0; i < 150; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 1.5,
                    vy: (Math.random() - 0.5) * 1.5,
                    radius: Math.random() * 2
                });
            }
        }
        
        function animateCanvas() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = 'rgba(0, 243, 255, 0.5)';
            ctx.strokeStyle = 'rgba(0, 243, 255, 0.1)';
            
            for(let i=0; i<particles.length; i++) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy;
                if(p.x < 0 || p.x > width) p.vx *= -1;
                if(p.y < 0 || p.y > height) p.vy *= -1;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
                ctx.fill();
                
                for(let j=i+1; j<particles.length; j++) {
                    let p2 = particles[j];
                    let dist = Math.sqrt(Math.pow(p.x-p2.x, 2) + Math.pow(p.y-p2.y, 2));
                    if(dist < 150) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animateCanvas);
        }
        
        window.addEventListener('resize', initCanvas);
        
        initCanvas();
        animateCanvas();
        resizeSlides();
        initSlides();
        lucide.createIcons();
    </script>
</body>
</html>
